<head>
  <meta charset="UTF-8" />

  <meta name="color-scheme" content="light dark" />

  <title>Quản lý Báo Giá - Gia Nguyễn</title>
  <link rel="modulepreload" href="/app.js?v=20260617f" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Apply saved/OS theme before first paint (external so CSP can drop script unsafe-inline) -->
  <script src="/theme-init.js?v=20260615w"></script>
  <style>
    /* Instant boot splash so First Contentful Paint isn't blocked on the API */
    #boot { position: fixed; inset: 0; display: grid; place-items: center;
      background: var(--bg, #f5f6f8); color: var(--text-muted, #5b6575);
      font-family: "Be Vietnam Pro", system-ui, "Segoe UI", Roboto, sans-serif; }
    #boot .gn { width: 52px; height: 52px; border-radius: 13px; display: grid; place-items: center;
      color: #1f2510; font-weight: 800; font-size: 19px; letter-spacing: .5px;
      background: #f5b400;
      animation: bootpulse 1.1s ease-in-out infinite; }
    #boot p { margin-top: 14px; font-size: 13px; }
    @keyframes bootpulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(.92); opacity: .8 } }
  </style>
</head>
<body>
  <div id="boot"><div style="text-align:center"><div class="gn">GN</div><p>Đang tải…</p></div></div>
  <div id="app"></div>
  <script type="module" src="/app.js?v=20260617f"></script>
  <!-- v=20260617f: BẢNG NỘI BỘ = lưới ĐẦY ĐỦ y hệt báo giá (tái dùng drawItems) — chọn template GN/CLF có/không ngày, công thức ƒ, copy/paste, phím tắt, nhóm cha/con, Tổng bảng; CHỈ khác KHÔNG xuất Excel. drawItems tham số hoá (tableSel/fxBar) + scope footer/subtotal/grid-stat theo từng lưới. Verified Playwright + 191 test -->

</body>
</html>
