name: CI

on:
  push:
    branches: [master, main, develop, "harden/**", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint • Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quanly
          POSTGRES_PASSWORD: quanly_pwd
          POSTGRES_DB: quanly_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U quanly -d quanly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://quanly:quanly_pwd@localhost:5432/quanly_test?schema=public
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-secret-must-be-long-enough-to-pass-the-zod-validator-yes
      NODE_ENV: test
      # Force the DB-backed integration suites to RUN (and fail if the DB/schema
      # is missing) instead of silently skipping — closes the "green but untested
      # authz" gap.
      REQUIRE_DB_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Gác KIỂU: backend (.js + .ts trộn) chạy tsx runtime nên lỗi type chỉ lộ lúc deploy.
      # tsc --noEmit chặn .ts sai kiểu trước khi merge. (Script "typecheck" đã có sẵn.)
      - name: Typecheck (backend)
        run: npm run typecheck

      # Gác BUILD frontend React (web/): tsc --noEmit + vite build. Trước đây không chạy ở CI
      # nên app React có thể vỡ build mà PR vẫn xanh.
      - name: Typecheck + build web (React)
        run: npm run web:build

      - name: Prisma generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Unit + integration tests (with coverage)
        run: npm run test:coverage

      - name: Dependency audit (high+) — gate
        run: npm audit --omit=dev --audit-level=high

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan all commits

      # Secret scanning across the whole git history (no org license needed via Docker).
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --no-banner --exit-code 1

      # Vulnerabilities + misconfig + secrets in the working tree.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
