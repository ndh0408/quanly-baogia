apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quanly
  namespace: quanly
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"      # SSE
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # SSE
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [baogia.example.com]
      secretName: quanly-tls
  rules:
    - host: baogia.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quanly-app
                port: { number: 80 }
