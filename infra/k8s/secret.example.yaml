# Copy to secret.yaml and fill in real values. DO NOT COMMIT secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: quanly-secrets
  namespace: quanly
type: Opaque
stringData:
  # DATABASE_PASSWORD được postgres StatefulSet tham chiếu (không optional) — PHẢI khớp mật khẩu trong DATABASE_URL.
  DATABASE_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgresql://quanly:CHANGE_ME@postgres:5432/quanly?schema=public"
  # REDIS_PASSWORD được redis Deployment dùng cho --requirepass — PHẢI khớp mật khẩu trong REDIS_URL.
  REDIS_PASSWORD: "CHANGE_ME_REDIS"
  REDIS_URL: "redis://:CHANGE_ME_REDIS@redis:6379"
  SESSION_SECRET: "CHANGE_ME_PRODUCTION_USE_LONG_RANDOM_STRING_OF_AT_LEAST_32_CHARS"
  JWT_SECRET: "" # leave empty to derive from SESSION_SECRET
  S3_ENDPOINT: "https://s3.example.com"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "Báo Giá <noreply@example.com>"
  TELEGRAM_BOT_TOKEN: ""
