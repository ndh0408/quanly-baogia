# NON-PRODUCTION single-instance Postgres for dev/staging clusters.
# In production use a managed DB (RDS / Cloud SQL / Supabase / Neon).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quanly-pgdata
  namespace: quanly
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: quanly
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: quanly }
            - { name: POSTGRES_DB, value: quanly }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: quanly-secrets, key: DATABASE_PASSWORD, optional: true } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "quanly"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: quanly-pgdata }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: quanly
spec:
  type: ClusterIP
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
