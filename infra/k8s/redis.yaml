apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: quanly
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # XÁC THỰC BẮT BUỘC: --requirepass từ secret (khớp đường docker-compose prod). Không có nó thì bất kỳ
          # pod nào trong cluster cũng đọc/ghi được session + hàng đợi job. $(REDIS_PASSWORD) expand từ env dưới.
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: quanly-secrets, key: REDIS_PASSWORD } }
          args:
            [
              "redis-server",
              "--requirepass",
              "$(REDIS_PASSWORD)",
              "--save",
              "60",
              "1",
              "--maxmemory",
              "256mb",
              "--maxmemory-policy",
              "allkeys-lru",
            ]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: quanly
spec:
  type: ClusterIP
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
