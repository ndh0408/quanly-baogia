{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quanly.fullname" . }}-redis
  labels: {{- include "quanly.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "quanly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels: {{- include "quanly.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          # XÁC THỰC BẮT BUỘC: --requirepass (khớp mật khẩu nhúng trong quanly.redisUrl). Không có nó thì mọi
          # pod trong cluster đọc/ghi được session + hàng đợi. Đổi mặc định qua .Values.redis.password.
          args: ["redis-server", "--requirepass", {{ .Values.redis.password | quote }}, "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quanly.fullname" . }}-redis
spec:
  type: ClusterIP
  selector: {{- include "quanly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports: [{ port: 6379, targetPort: 6379 }]
{{- end }}
