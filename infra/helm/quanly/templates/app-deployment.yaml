apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quanly.fullname" . }}-app
  labels: {{- include "quanly.labels" . | nindent 4 }}
spec:
  {{- if not .Values.app.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "quanly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: {{- include "quanly.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      serviceAccountName: {{ include "quanly.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - { name: http, containerPort: 3000 }
          envFrom:
            - configMapRef: { name: {{ include "quanly.fullname" . }}-config }
            - secretRef:    { name: {{ include "quanly.secretName" . }} }
          resources: {{- toYaml .Values.app.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.app.runMigration }}
          command: ["/bin/sh", "-c"]
          args: ["npx prisma db push --accept-data-loss && node src/server.js"]
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quanly.fullname" . }}-app
  labels: {{- include "quanly.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "quanly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - { name: http, port: {{ .Values.service.port }}, targetPort: http }
{{- if .Values.app.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "quanly.fullname" . }}-app
  labels: {{- include "quanly.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "quanly.fullname" . }}-app
  minReplicas: {{ .Values.app.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.app.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.app.autoscaling.targetCPU }} }
    {{- if .Values.app.autoscaling.targetMemory }}
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: {{ .Values.app.autoscaling.targetMemory }} }
    {{- end }}
{{- end }}
